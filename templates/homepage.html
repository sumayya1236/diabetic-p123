<!doctype html>
<html lang="en">
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">

<title>Diabetic Prediction App</title>

<style>

body{
background-image:url(./static/photo.jpg);
background-size:500px;
background-repeat:no-repeat;
}

</style>

</head>

<body>

<div class="header bg-primary text-white p-2">

<marquee>

<h1>
Diabetes Prediction In Pregnant Women
</h1>

</marquee>

</div>


<div class="container text-black col-md-4"
style="margin-top:10px; border-radius:10px; opacity:0.8;">

<h3>Enter the parameters</h3>

<h3>{{result}}</h3>

<h4>Risk Score : {{riskscore}}</h4>

<h4>Risk Level : {{risklevel}}</h4>


<form action="/predict" method="post">

<table class="table">

<tr>
<td>Age</td>
<td><input type="text" name="age" required></td>
</tr>

<tr>
<td>BMI</td>
<td><input type="text" name="bmi" required></td>
</tr>

<tr>
<td>Pregnancies</td>
<td><input type="text" name="preg" required></td>
</tr>

<tr>
<td>Blood Pressure</td>
<td><input type="text" name="bp" required></td>
</tr>

<tr>
<td>Glucose</td>
<td><input type="text" name="glu" required></td>
</tr>

<tr>
<td>Family History (1=Yes,0=No)</td>
<td><input type="text" name="family" required></td>
</tr>

<tr>
<td>
<input type="reset" class="btn btn-danger">
<input type="submit" class="btn btn-success">
</td>
</tr>

</table>

</form>

</div>

</body>
</html>
